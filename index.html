<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMAAH Tic Tok Toe</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
  body { font-family: 'Poppins', sans-serif; }

  .cell { transition: 0.2s; }
  .cell:hover { transform: scale(1.05); }

  .btn-hover { transition: 0.2s; }
  .btn-hover:hover { 
    transform: scale(1.05); 
    background-color: #1e40af !important; 
  }

  .win-cell { 
    background-color: #facc15 !important; 
    color: #000 !important; 
  }
</style>
</head>

<body class="bg-blue-900 text-white flex flex-col items-center min-h-screen pt-20">

<h1 class="text-4xl font-extrabold mb-8">SMAAH Tic Tok Toe</h1>

<div class="flex gap-5 mb-6">
  <button id="playAI" class="btn-hover px-6 py-3 rounded-lg font-semibold bg-green-600">Play with AI</button>
  <button id="playHuman" class="btn-hover px-6 py-3 rounded-lg font-semibold bg-indigo-600">Play with Human</button>
</div>

<div class="grid grid-cols-3 gap-4 mb-6">
  <div class="cell w-24 h-24 bg-blue-800 flex items-center justify-center text-4xl font-bold rounded-xl cursor-pointer"></div>
  <div class="cell w-24 h-24 bg-blue-800 flex items-center justify-center text-4xl font-bold rounded-xl cursor-pointer"></div>
  <div class="cell w-24 h-24 bg-blue-800 flex items-center justify-center text-4xl font-bold rounded-xl cursor-pointer"></div>
  <div class="cell w-24 h-24 bg-blue-800 flex items-center justify-center text-4xl font-bold rounded-xl cursor-pointer"></div>
  <div class="cell w-24 h-24 bg-blue-800 flex items-center justify-center text-4xl font-bold rounded-xl cursor-pointer"></div>
  <div class="cell w-24 h-24 bg-blue-800 flex items-center justify-center text-4xl font-bold rounded-xl cursor-pointer"></div>
  <div class="cell w-24 h-24 bg-blue-800 flex items-center justify-center text-4xl font-bold rounded-xl cursor-pointer"></div>
  <div class="cell w-24 h-24 bg-blue-800 flex items-center justify-center text-4xl font-bold rounded-xl cursor-pointer"></div>
  <div class="cell w-24 h-24 bg-blue-800 flex items-center justify-center text-4xl font-bold rounded-xl cursor-pointer"></div>
</div>

<p id="statusIndicator" class="text-xl font-bold text-yellow-400 mb-4 text-center h-8"></p>

<button id="reset" class="btn-hover px-8 py-3 bg-red-600 rounded-lg font-semibold mb-6">Play Again</button>

<script src="script.js"></script>
    
</body>
</html>
